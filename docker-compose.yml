services:
  db:
    image: postgres:15-alpine
    container_name: os_digital_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: administ
      POSTGRES_DB: os_digital
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: os_digital_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    environment:
      # O backend enxerga o BD através do nome do serviço "db" na rede bridge do Docker
      - DATABASE_URL=postgresql://admin:administ@db:5432/os_digital
      - SECRET_KEY=minha_chave_ultra_secreta_aqui_123*
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      # URL interna da Evolution API para enviar mensagens de resposta
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=osdigital_evo_key_2026
    depends_on:
      - db
      - evolution

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: os_digital_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Evolution API v2 — Gateway WhatsApp ──────────────────────────────────────
  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: os_digital_evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://evolution:8080
      - AUTHENTICATION_API_KEY=osdigital_evo_key_2026
      # Banco de dados PRÓPRIO da Evolution (separado do OS Digital)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo_user:evo_pass@evolution_db:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=os_digital_bot
      # Webhook global — aponta para o backend do OS Digital (na rede interna Docker)
      - WEBHOOK_GLOBAL_URL=http://backend:8000/chamados/webhook/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_GLOBAL_BASE64=true
      - WEBHOOK_EVENTS=MESSAGES_UPSERT,QRCODE_UPDATED,CONNECTION_UPDATE,MESSAGES_UPDATE
      - LOG_LEVEL=WARN
    depends_on:
      - evolution_db
    volumes:
      - evolution_data:/evolution/instances

  # ── Banco de dados exclusivo da Evolution API ─────────────────────────────────
  evolution_db:
    image: postgres:15-alpine
    container_name: os_digital_evolution_db
    restart: always
    environment:
      POSTGRES_USER: evo_user
      POSTGRES_PASSWORD: evo_pass
      POSTGRES_DB: evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  evolution_data:
  evolution_db_data:
